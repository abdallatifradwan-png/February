<html lang="ar" dir="rtl">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #1a5f7a;
            --secondary-color: #159895;
            --accent-color: #57c5b6;
            --bg-color: #f0f4f8;
            --text-color: #1e293b;
            --white: #ffffff;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Tajawal', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); line-height: 1.6; padding-bottom: 50px; }

        header {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: var(--white);
            padding: 3rem 1rem;
            text-align: center;
            border-bottom: 6px solid var(--secondary-color);
        }

        .header-info h1 { font-size: 2.2rem; font-weight: 800; margin-bottom: 0.5rem; letter-spacing: 1px; }
        .meta-info { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; font-size: 1rem; opacity: 0.9; margin-top: 10px; }
        
        .container { max-width: 1100px; margin: -40px auto 0; padding: 0 1.5rem; }

        .selection-area {
            background: var(--white);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: var(--shadow);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-bottom: 2.5rem;
        }

        .form-group { display: flex; flex-direction: column; gap: 0.8rem; }
        label { font-weight: 700; color: var(--primary-color); font-size: 1.1rem; }
        
        select {
            padding: 1rem;
            border: 2px solid #cbd5e1;
            border-radius: 12px;
            font-size: 1rem;
            background-color: #f8fafc;
            cursor: pointer;
            transition: all 0.3s ease;
            outline: none;
        }

        select:focus { border-color: var(--secondary-color); box-shadow: 0 0 0 4px rgba(21, 152, 149, 0.1); }

        #school-card-container { display: none; animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1); }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .school-card { background: var(--white); border-radius: 25px; overflow: hidden; box-shadow: var(--shadow); }
        .card-header {
            background: linear-gradient(to left, var(--primary-color), var(--secondary-color));
            color: var(--white);
            padding: 2rem;
            text-align: center;
        }
        .card-header h2 { font-size: 1.8rem; margin-bottom: 8px; }
        .card-header span { background: rgba(255,255,255,0.2); padding: 5px 15px; border-radius: 20px; font-size: 0.9rem; }

        .card-body {
            padding: 2.5rem;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
        }

        .subject-item {
            background: #ffffff;
            padding: 1.2rem;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #e2e8f0;
            transition: transform 0.2s;
        }
        .subject-item:hover { transform: scale(1.03); border-color: var(--accent-color); }

        .subject-info { display: flex; flex-direction: column; gap: 6px; }
        .subject-name { font-weight: 700; color: #334155; font-size: 1.1rem; }
        
        .pages-info { font-size: 0.85rem; font-weight: 600; display: inline-block; width: fit-content;}
        .pages-done-badge { color: #059669; background: #ecfdf5; padding: 3px 8px; border-radius: 6px; border: 1px solid #a7f3d0;}
        .pages-remaining { color: #dc2626; background: #fef2f2; padding: 3px 8px; border-radius: 6px; border: 1px solid #fecaca;}

        .achievement-rate {
            font-weight: 800;
            color: var(--primary-color);
            font-size: 1.3rem;
            background: #f1f5f9;
            padding: 6px 12px;
            border-radius: 10px;
        }

        .rate-100 { color: #059669; background: #ecfdf5; }
        .rate-low { color: #dc2626; background: #fef2f2; }

        footer {
            text-align: center;
            margin-top: 4rem;
            padding: 3rem;
            background: #f8fafc;
            border-top: 1px solid #e2e8f0;
        }
        .footer-boss { font-size: 1.3rem; font-weight: 700; color: var(--primary-color); margin-bottom: 5px; display: block; }
        .footer-dept { font-weight: 600; color: #64748b; }

        @media (max-width: 768px) {
            .selection-area { grid-template-columns: 1fr; }
            .container { margin-top: -20px; }
            .header-info h1 { font-size: 1.6rem; }
        }
    </style>
</head>

function updateSchools() {
    const branchSelect = document.getElementById('branch-select');
    const schoolSelect = document.getElementById('school-select');
    const branch = branchSelect.value;
    
    schoolSelect.innerHTML = '<option value="">-- اختر المدرسة --</option>';
    document.getElementById('school-card-container').style.display = 'none';

    if (branch && data[branch]) {
        schoolSelect.disabled = false;
        const sortedSchools = [...data[branch]].sort((a, b) => a.name.localeCompare(b.name, 'ar'));
        
        sortedSchools.forEach((school, index) => {
            const option = document.createElement('option');
            option.value = data[branch].indexOf(school); 
            option.textContent = school.name;
            schoolSelect.appendChild(option);
        });
    } else {
        schoolSelect.disabled = true;
    }
}

function showSchoolData() {
    const branch = document.getElementById('branch-select').value;
    const schoolIndex = document.getElementById('school-select').value;
    const container = document.getElementById('school-card-container');
    const grid = document.getElementById('subjects-grid');

    if (schoolIndex === "") {
        container.style.display = 'none';
        return;
    }

    const school = data[branch][schoolIndex];
    document.getElementById('display-school-name').textContent = school.name;
    document.getElementById('display-branch-name').textContent = "الفرع: " + document.getElementById('branch-select').options[document.getElementById('branch-select').selectedIndex].text;
    
    grid.innerHTML = '';
    
    for (const [subject, rate] of Object.entries(school.subjects)) {
        const item = document.createElement('div');
        item.className = 'subject-item';
        
        const rateNum = parseInt(rate);
        let rateClass = "";
        
        if (rateNum === 100) rateClass = "rate-100";
        else if (rateNum < 90) rateClass = "rate-low";
        
        // حساب الصفحات المتبقية بناءً على النسبة وإجمالي الصفحات
        const totalPagesForSubject = pageTotals[branch] && pageTotals[branch][subject] ? pageTotals[branch][subject] : 0;
        let pagesHtml = "";
        
        if (totalPagesForSubject > 0) {
            const remainingPages = rateNum === 100 ? 0 : Math.round(totalPagesForSubject * ((100 - rateNum) / 100));
            if (remainingPages === 0) {
                pagesHtml = `<span class="pages-info pages-done-badge">✓ تم الختم بالكامل</span>`;
            } else {
                pagesHtml = `<span class="pages-info pages-remaining">المتبقي: ${remainingPages} صفحة تقريباً</span>`;
            }
        } else {
            // في حال عدم توفر بيانات الصفحات للمادة
            pagesHtml = rateNum === 100 ? `<span class="pages-info pages-done-badge">✓ تم الختم</span>` : `<span class="pages-info" style="color:gray;">قيد الإنجاز</span>`;
        }
        
        item.innerHTML = `
            <div class="subject-info">
                <span class="subject-name">${subject}</span>
                ${pagesHtml}
            </div>
            <span class="achievement-rate ${rateClass}">${rate}</span>
        `;
        grid.appendChild(item);
    }

    container.style.display = 'block';
    container.scrollIntoView({ behavior: 'smooth', block: 'start' });
}
